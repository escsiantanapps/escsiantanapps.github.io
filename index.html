<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMS ESC Siantan</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Supaya tidak ada scroll ganda */
            background-color: #ffffff;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycby0V_mumZdqsAGOTwmQobWqBGsjcTSWMVLnuA17Crld_z80szM8cgMirP43vNPqWGMEVA/exec"></iframe>

    <script>
        // Registrasi Service Worker agar bisa di-install
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Aplikasi Siap!'))
                    .catch(err => console.log('Gagal:', err));
            });
        }
    </script>
</body>
</html>
